name: Build Docker images

on:
  pull_request:
  push:
    branches-ignore: 'main'

jobs:
  ubuntu:
    strategy:
      matrix:
        arch:
          - arm64
          - x86_64
        distro:
          - focal
          - jammy
          - latest
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          push: false
          build-args: ARCH=${{ matrix.arch }}
          tags: openquantumsafe/ci-ubuntu-${{ matrix.distro }}:latest-${{ matrix.arch }}
          context: ubuntu-${{ matrix.distro }}

  alpine-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build ci-alpine-amd64:latest, do not push
        uses: docker/build-push-action@v6
        with:
          push: false
          build-args: ARCH=amd64
          tags: openquantumsafe/ci-alpine-amd64:latest
          context: alpine

  debian:
    strategy:
      matrix:
        arch:
          - amd64
          - armhf
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build ci-debian-bullseye-${{ matrix.arch }}:latest, do not push
        uses: docker/build-push-action@v6
        with:
          push: false
          build-args: ARCH=${{ matrix.arch }}
          tags: openquantumsafe/ci-debian-bullseye-${{ matrix.arch }}:latest
          context: debian-bullseye
